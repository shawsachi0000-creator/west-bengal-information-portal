<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <h2>🇮🇳 Admin</h2>

        <ul>
            <li><i class="fas fa-home"></i> Dashboard</li>
            <li><i class="fas fa-newspaper"></i> News</li>
            <li><i class="fas fa-briefcase"></i> Jobs</li>
            <li><i class="fas fa-landmark"></i> Schemes</li>
            <li><i class="fas fa-users"></i> Users</li>
            <li><i class="fas fa-cog"></i> Settings</li>
            <li><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>

    </aside>

    <main class="content">

        <h1>Welcome Admin 👋</h1>

        <div class="cards">

            <div class="card">
                <h2>120</h2>
                <p>Total News</p>
            </div>

            <div class="card">
                <h2>54</h2>
                <p>Total Jobs</p>
            </div>

            <div class="card">
                <h2>25</h2>
                <p>Government Schemes</p>
            </div>

            <div class="card">
                <h2>350</h2>
                <p>Users</p>
            </div>

        </div>
        <hr style="margin:40px 0;">

<h2>📰 News Management</h2>

<div class="news-form">
    <input type="text" id="newsTitle" placeholder="News Title">
    <textarea id="newsDescription" placeholder="News Description"></textarea>
    <button onclick="addNews()">Add News</button>
</div>

<div id="newsList"></div>
<hr style="margin:40px 0;">

<h2>💼 Jobs Management</h2>

<div class="job-form">

    <input type="text" id="jobTitle" placeholder="Job Title">

    <input type="text" id="companyName" placeholder="Company Name">

    <input type="text" id="jobLocation" placeholder="Location">

    <button onclick="addJob()">Add Job</button>

</div>

<div id="jobList"></div>
<hr style="margin:40px 0;">

<h2>🏛️ Government Schemes</h2>

<div class="scheme-form">

    <input type="text" id="schemeTitle" placeholder="Scheme Name">

    <textarea id="schemeDescription" placeholder="Scheme Description"></textarea>

    <button onclick="addScheme()">Add Scheme</button>

</div>

<div id="schemeList"></div>

    </main>

</div>
<script src="admin.js"></script>
</body>
</html>
