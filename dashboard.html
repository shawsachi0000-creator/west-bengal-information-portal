<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <h2>🇮🇳 Admin</h2>

        <ul>
            <li><i class="fas fa-home"></i> Dashboard</li>
            <li><i class="fas fa-newspaper"></i> News</li>
            <li><i class="fas fa-briefcase"></i> Jobs</li>
            <li><i class="fas fa-landmark"></i> Schemes</li>
            <li><i class="fas fa-users"></i> Users</li>
            <li><i class="fas fa-cog"></i> Settings</li>
            <li><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>

    </aside>

    <main class="content">

        <h1>Welcome Admin 👋</h1>

        <div class="cards">

            <div class="card">
                <h2>120</h2>
                <p>Total News</p>
            </div>

            <div class="card">
                <h2>54</h2>
                <p>Total Jobs</p>
            </div>

            <div class="card">
                <h2>25</h2>
                <p>Government Schemes</p>
            </div>

            <div class="card">
                <h2>350</h2>
                <p>Users</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
